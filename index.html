<!-- 此版本仅支持IE9以上浏览器，适配手机版 -->
<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<meta charset="utf-8">
		<title>打灰狼</title>
		<link rel="shortcut icon" href="image/favicon.png">
		<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css" />
		<link rel="stylesheet" type="text/css" href="css/style.css" />
		<script src="js/jquery-3.3.1.min.js" type="text/javascript" charset="utf-8"></script>
	</head>
	<body>
		<audio id="game-bg-audio" loop preload="auto">
			<source src="audio/background-music.ogg" type="audio/ogg">
		</audio>
		<div class="game-box-bg">
			<div class="game-header">
				<div class="header-top">
					<div class="status-metrics">
						<div class="rank-box">
							<span class="rank-title">排名</span>
							<strong><span class="rank-num">--</span></strong>
						</div>
						<div class="score-box">
							<span class="score-title">得分</span>
							<strong><span class="score-num">--</span></strong>
						</div>
						<div class="timer-list">
							<div class="time-box">
								<span class="time-title">时间</span>
								<strong><span class="time-num">30</span><span class="time-unit">秒</span></strong>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="controls-box">
				<ul>
					<li class="music-box">
						<button type="button" id="music-button"></button>
					</li>
					<li class="ranking-box">
						<button type="button" class="ranking-button" data-toggle="modal" data-target="#ranking-modal"></button>
					</li>
				</ul>
			</div>
			<div class="start-box">
				<h1 class="start-title">打灰狼</h1>
				<div class="participants-box">参与人次 <strong><span id="participant-count">0</span></strong></div>
				<ul class="start-rules">
					<li>游戏时间：30 秒</li>
					<li>打到大灰狼 +10 分</li>
					<li>打到小灰灰 -10 分</li>
					<li>分数不会低于 0</li>
					<li class="top-ranking-panel">
						<ol id="top-ranking-list" class="top-ranking-list"></ol>
					</li>
					<li class="game-result-panel">
						<div id="game-result-content" class="game-result-content"></div>
					</li>
				</ul>
				<button class="start-button">开始游戏</button>
			</div>

		</div>

		<div class="modal fade ranking-modal" id="ranking-modal" tabindex="-1" role="dialog" aria-labelledby="ranking-modal-title"
		 aria-hidden="true">
			<div class="modal-dialog modal-dialog-scrollable modal-dialog-centered" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 id="ranking-modal-title">榜单</h5>
						<button type="button" class="close" data-dismiss="modal" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
					<div class="modal-body">
						<table class="table ranking-table">
							<thead>
								<tr>
									<th scope="col">排名</th>
									<th scope="col">编号</th>
									<th scope="col">分数</th>
									<th scope="col">时间</th>
									
								</tr>
							</thead>
							<tbody id="ranking-table-body">
							</tbody>
						</table>
					</div>
					<div class="modal-footer">
						<button type="button" class="clear-ranking-button" data-dismiss="modal">清除数据</button>
					</div>

				</div>
			</div>
		</div>

		<script src="js/bootstrap.min.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/main.js" type="text/javascript" charset="utf-8"></script>
	</body>
</html>
